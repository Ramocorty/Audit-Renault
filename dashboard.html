<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background:var(--black); color:var(--yellow); padding:15px 20px; display:flex; align-items:center; justify-content:space-between; }
    .nav-menu { display:flex; background:#222; padding:10px; }
    .nav-btn { flex:1; padding:12px; text-align:center; color:white; text-decoration:none; font-weight:bold; border-radius:8px; margin:0 5px; font-size:13.5px; }
    .nav-btn.active { background:var(--yellow); color:var(--black); }
    .container { padding:20px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 15px; }
    .stat-card { background:#f8f8f8; padding:18px; border-radius:12px; margin-bottom:15px; text-align:center; }
    .compliance-card { background:linear-gradient(135deg, #e8f5e9, #c8e6c9); }
    table { width:100%; border-collapse:collapse; margin:15px 0; }
    th, td { border:1px solid #ddd; padding:10px; text-align:left; }
    th { background:var(--black); color:var(--yellow); }
    button { background:var(--black); color:var(--yellow); padding:14px; font-size:16px; font-weight:bold; border:none; border-radius:10px; width:100%; margin:10px 0; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="nav-menu">
      <a href="index-form.html" class="nav-btn">📋 Audit Simple</a>
      <a href="grille-detaillee.html" class="nav-btn">📋 Grille Détaillée</a>
      <a href="photo.html" class="nav-btn">📸 Photo</a>
      <a href="dashboard.html" class="nav-btn active">📊 KPI</a>
    </div>

    <div class="container">
      <button onclick="loadStats()">🔄 Actualiser les statistiques</button>

      <div class="stat-card">
        <h2>Nombre total d'audits</h2>
        <h1 id="totalAudits" style="font-size:48px;margin:10px 0;color:var(--black);">0</h1>
      </div>

      <div class="stat-card">
        <h2>Nombre de connexions</h2>
        <h1 id="totalLogins" style="font-size:48px;margin:10px 0;color:var(--black);">0</h1>
      </div>

      <div class="stat-card compliance-card">
        <h2>% Conformité Global</h2>
        <h1 id="conformitePercent" style="font-size:52px;margin:10px 0;color:#2e7d32;">0%</h1>
        <p id="conformiteDetail" style="margin:5px 0; color:#1b5e20;">Calculé sur les grilles</p>
      </div>

      <h2>Audits par site</h2>
      <table id="tableSites">
        <thead><tr><th>Site</th><th>Nombre</th></tr></thead>
        <tbody></tbody>
      </table>

      <h2>Derniers audits</h2>
      <table id="tableDerniers">
        <thead><tr><th>Date</th><th>Type</th><th>Site</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadStats() {
      try {
        // Audits
        const resAudits = await fetch('/api/audits');
        const audits = await resAudits.json();
        document.getElementById('totalAudits').textContent = audits.length;

        // Connexions
        const resLogins = await fetch('/api/logins');
        const logins = await resLogins.json();
        document.getElementById('totalLogins').textContent = logins.length || 0;

        // Conformité
        const grilles = audits.filter(a => a.type === "grille_detaillee");
        let totalQ = 0, totalOui = 0;
        grilles.forEach(g => {
          for (let i = 1; i <= 26; i++) {
            const rep = g[`q${i}`];
            if (rep) {
              totalQ++;
              if (rep === "Oui") totalOui++;
            }
          }
        });
        const percent = totalQ > 0 ? Math.round((totalOui / totalQ) * 100) : 0;
        document.getElementById('conformitePercent').textContent = percent + "%";
        document.getElementById('conformiteDetail').textContent = `${totalOui} Oui / ${totalQ} réponses`;

      } catch (e) {
        console.error(e);
      }
    }

    window.onload = () => {
      if (!localStorage.getItem('userEmail')) {
        window.location.href = "index.html";
      } else {
        loadStats();
      }
    };
  </script>
</body>
</html>
