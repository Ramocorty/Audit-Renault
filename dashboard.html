<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1a1a1a, #333); 
      margin:0; padding:0; color:white; 
      display:flex; justify-content:center; align-items:center; 
      min-height:100vh;
    }
    .phone { 
      max-width:420px; width:100%; background:white; color:black; 
      border-radius:35px; overflow:hidden; 
      box-shadow:0 20px 40px rgba(0,0,0,0.7); 
      border:12px solid var(--black); 
      min-height:680px;
    }
    .header { 
      background: linear-gradient(135deg, var(--black), #222); 
      color: var(--yellow); 
      padding: 40px 20px 30px; 
      text-align:center; 
    }
    .logo { height: 90px; margin-bottom: 15px; }
    .title { font-size: 26px; font-weight: bold; margin: 10px 0; }
    .subtitle { font-size: 16px; opacity: 0.9; }

    .container { padding: 30px 25px; }
    .choice { 
      background:#f8f8f8; 
      padding:20px; 
      margin:15px 0; 
      border-radius:16px; 
      text-align:center; 
      cursor:pointer; 
      border:3px solid transparent; 
      transition: all 0.3s;
    }
    .choice.active { 
      border-color:var(--yellow); 
      background:white; 
      box-shadow:0 0 0 4px rgba(239, 223, 0, 0.3);
    }
    .choice h3 { margin: 10px 0 5px; color:var(--black); }
    
    input[type="email"] { 
      width:100%; padding:15px; margin-top:10px; 
      border:2px solid #ddd; border-radius:10px; font-size:16px; 
    }
    .consent { 
      margin:25px 0; padding:15px; background:#f8f8f8; 
      border-radius:12px; font-size:14px; line-height:1.5; 
    }
    button { 
      background:var(--black); color:var(--yellow); 
      padding:18px; font-size:18px; font-weight:bold; 
      border:none; border-radius:12px; width:100%; 
      margin-top:20px; cursor:pointer;
    }
    button:disabled { background:#555; color:#aaa; cursor:not-allowed; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <div class="title">Audit Terrain</div>
      <div class="subtitle">Système de conformité sécurité</div>
    </div>

    <div class="container">
      <h2 style="text-align:center; color:var(--black); margin-bottom:25px;">Qui êtes-vous ?</h2>

      <div class="choice" id="interneChoice" onclick="selectType('interne')">
        <h3>👷 Interne Renault</h3>
        <p>Employé Renault</p>
      </div>

      <div class="choice" id="externeChoice" onclick="selectType('externe')">
        <h3>🏗️ Externe / Prestataire</h3>
        <p>Société partenaire</p>
      </div>

      <div id="emailInterne" style="display:none;">
        <label>Email Renault</label>
        <input type="email" id="emailInterneInput" placeholder="prenom.nom@renault.com" oninput="toggleButton()">
      </div>

      <div id="emailExterne" style="display:none;">
        <label>Votre Email</label>
        <input type="email" id="emailExterneInput" placeholder="votre.email@entreprise.com" oninput="toggleButton()">
      </div>

      <div class="consent">
        <input type="checkbox" id="consentCheck" onchange="toggleButton()">
        <label for="consentCheck" style="display:inline; font-weight:normal;">
          J'accepte la collecte de mes données dans le cadre de ce MVP Audit Renault 
          (conformément au RGPD)
        </label>
      </div>

      <button id="btnLogin" disabled onclick="validerLogin()">Se Connecter</button>
    </div>
  </div>

  <script>
    let userType = null;

    function selectType(type) {
      userType = type;
      
      document.getElementById('interneChoice').classList.toggle('active', type === 'interne');
      document.getElementById('externeChoice').classList.toggle('active', type === 'externe');

      document.getElementById('emailInterne').style.display = type === 'interne' ? 'block' : 'none';
      document.getElementById('emailExterne').style.display = type === 'externe' ? 'block' : 'none';

      toggleButton();
    }

    function toggleButton() {
      const consent = document.getElementById('consentCheck').checked;
      let emailOk = false;

      if (userType === 'interne') {
        emailOk = document.getElementById('emailInterneInput').value.trim() !== '';
      } else if (userType === 'externe') {
        emailOk = document.getElementById('emailExterneInput').value.trim() !== '';
      }

      document.getElementById('btnLogin').disabled = !(consent && userType && emailOk);
    }

    async function validerLogin() {
      const emailField = userType === 'interne' ? 'emailInterneInput' : 'emailExterneInput';
      const email = document.getElementById(emailField).value.trim();

      if (!email) return alert("Veuillez entrer votre email");

      try {
        await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            userType: userType,
            consentRGPD: true,
            dateConnexion: new Date().toISOString()
          })
        });
      } catch (e) {
        console.log("Erreur envoi login");
      }

      localStorage.setItem('userEmail', email);
      localStorage.setItem('userType', userType);
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
