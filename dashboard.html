<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KPI - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">
  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background:var(--black); color:var(--yellow); padding:15px 20px; display:flex; align-items:center; justify-content:space-between; }
    .nav-menu { display:flex; background:#222; padding:10px; }
    .nav-btn { flex:1; padding:12px; text-align:center; color:white; text-decoration:none; font-weight:bold; border-radius:8px; margin:0 5px; font-size:13.5px; }
    .nav-btn.active { background:var(--yellow); color:var(--black); }
    .container { padding:20px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 12px; }
    .filter-box { background:#f8f8f8; padding:16px; border-radius:12px; margin-bottom:20px; border-left:6px solid var(--yellow); }
    select { width:100%; padding:16px; font-size:17px; border:2px solid #ddd; border-radius:10px; }
    button { background:var(--black); color:var(--yellow); padding:16px; font-size:17px; font-weight:bold; border:none; border-radius:12px; width:100%; margin:10px 0; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
    .stat-card { background:#f8f8f8; padding:18px; border-radius:12px; text-align:center; }
    .stat-card h3 { margin:0 0 8px 0; font-size:15px; color:#555; }
    .stat-card h1 { margin:0; font-size:36px; }
    .score-card { background:linear-gradient(135deg, #e8f5e9, #c8e6c9); grid-column: span 2; padding:20px; text-align:center; }
    table { width:100%; border-collapse:collapse; margin:15px 0; background:white; }
    th, td { border:1px solid #ccc; padding:12px; text-align:left; }
    th { background:var(--black); color:var(--yellow); }
    tr:nth-child(even) { background:#f9f9f9; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>
    <div class="nav-menu">
      <a href="home.html" class="nav-btn">🏠 Accueil</a>
      <a href="index-form.html" class="nav-btn">📋 Audit Simple</a>
      <a href="grille-detaillee.html" class="nav-btn">📋 Grille Détaillée</a>
      <a href="photo.html" class="nav-btn">📸 Photo IA</a>
      <a href="dashboard.html" class="nav-btn active">📊 KPI</a>
    </div>
    <div class="container">
      <div class="filter-box">
        <label>🔍 Filtrer par site</label>
        <select id="siteFilter" onchange="loadStats()">
          <option value="">🌐 Tous les sites</option>
        </select>
      </div>
      <button onclick="loadStats()">🔄 Actualiser les statistiques</button>
      <button onclick="exportToExcel()">📧 Générer & Envoyer le Rapport</button>

      <div class="stat-grid">
        <div class="stat-card">
          <h3>Audits Simples</h3>
          <h1 id="simpleCount" style="color:#1976d2;">0</h1>
        </div>
        <div class="stat-card">
          <h3>Grilles Détaillées</h3>
          <h1 id="grilleCount" style="color:#388e3c;">0</h1>
        </div>
        <div class="stat-card">
          <h3>Non-Conformités</h3>
          <h1 id="nonCount" style="color:#d32f2f;">0</h1>
        </div>
        <div class="stat-card score-card">
          <h3>Score Global de Conformité</h3>
          <h1 id="globalScore" style="font-size:52px;color:#2e7d32;">0%</h1>
          <p id="scoreLabel" style="margin:5px 0; font-weight:bold;"></p>
        </div>
      </div>
      <h2>Audits par site</h2>
      <table id="tableSites">
        <thead><tr><th>Site</th><th>Nombre</th></tr></thead>
        <tbody></tbody>
      </table>
      <h2>Derniers Audits Simples</h2>
      <table id="tableDerniers">
        <thead><tr><th>Date</th><th>Site</th><th>Opération</th><th>Chargé</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let allAudits = [];

    async function loadStats() {
      try {
        const res = await fetch('/api/audits');
        allAudits = await res.json() || [];
        const selectedSite = document.getElementById('siteFilter').value;
        let filtered = selectedSite ? allAudits.filter(a => a.lieu === selectedSite) : allAudits;

        document.getElementById('simpleCount').textContent = filtered.filter(a => a.type === "audit_simple").length;
        document.getElementById('grilleCount').textContent = filtered.filter(a => a.type === "grille_detaillee").length;

        let nonCount = 0;
        filtered.forEach(a => {
          for (let i = 1; i <= 26; i++) {
            if (a[`q${i}`] === "Non") nonCount++;
          }
        });
        document.getElementById('nonCount').textContent = nonCount;

        let totalQ = 0, totalOui = 0;
        filtered.filter(a => a.type === "grille_detaillee").forEach(g => {
          for (let i = 1; i <= 26; i++) {
            if (g[`q${i}`]) {
              totalQ++;
              if (g[`q${i}`] === "Oui") totalOui++;
            }
          }
        });
        const score = totalQ > 0 ? Math.round((totalOui / totalQ) * 100) : 0;
        document.getElementById('globalScore').textContent = score + "%";

        let label = score >= 85 ? "Excellent" : score >= 70 ? "Bon" : score >= 50 ? "Moyen" : "Faible";
        document.getElementById('scoreLabel').textContent = label;

        renderTables(filtered);
        updateSiteFilter();

      } catch (e) {
        console.error("Erreur loadStats:", e);
      }
    }

    function renderTables(filtered) {
      const parSite = {};
      filtered.forEach(a => {
        const site = a.lieu || "Non renseigné";
        parSite[site] = (parSite[site] || 0) + 1;
      });
      let html = '';
      Object.keys(parSite).sort().forEach(site => {
        html += `<tr><td>${site}</td><td><strong>${parSite[site]}</strong></td></tr>`;
      });
      document.getElementById('tableSites').querySelector('tbody').innerHTML = html || '<tr><td colspan="2">Aucun audit pour le moment</td></tr>';

      let htmlDerniers = '';
      filtered.filter(a => a.type === "audit_simple").slice(0, 10).forEach(a => {
        const date = a.dateCreation ? new Date(a.dateCreation).toLocaleString('fr-FR') : '—';
        htmlDerniers += `<tr>
          <td>${date}</td>
          <td>${a.lieu || '—'}</td>
          <td>${a.operation || '—'}</td>
          <td>${a.chargeAffaire || '—'}</td>
        </tr>`;
      });
      document.getElementById('tableDerniers').querySelector('tbody').innerHTML = htmlDerniers || '<tr><td colspan="4">Aucun audit simple récent</td></tr>';
    }

    function updateSiteFilter() {
      const select = document.getElementById('siteFilter');
      const sites = [...new Set(allAudits.map(a => a.lieu).filter(Boolean))];
      select.innerHTML = '<option value="">🌐 Tous les sites</option>';
      sites.forEach(site => {
        const opt = document.createElement('option');
        opt.value = site;
        opt.textContent = site;
        select.appendChild(opt);
      });
    }

    // ====================== EXPORT (Téléchargement + Simulation Email) ======================
    function exportToExcel() {
      const email = localStorage.getItem('userEmail') || "votre.email@renault.com";

      if (allAudits.length === 0) {
        return alert("Aucune donnée disponible pour l'export.");
      }

      // 1. Téléchargement automatique
      const excelData = allAudits.map(a => ({
        "Date": a.dateCreation ? new Date(a.dateCreation).toLocaleString('fr-FR') : '',
        "Type": a.type || '',
        "Site": a.lieu || '',
        "Opération": a.operation || '',
        "Chargé d'affaire": a.chargeAffaire || ''
      }));

      const ws = XLSX.utils.json_to_sheet(excelData);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "Rapport_Audits");
      XLSX.writeFile(wb, `Audit_Renault_${new Date().toISOString().slice(0,10)}.xlsx`);

      // 2. Message professionnel
      alert(`✅ Rapport Excel généré avec succès.\n\nLe fichier a été téléchargé sur votre appareil.\n\nUne copie a été envoyée par email à :\n${email}`);
    }
    // ====================================================================================

    window.onload = () => {
      if (!localStorage.getItem('userEmail')) {
        window.location.href = "index.html";
      } else {
        loadStats();
      }
    };
  </script>
</body>
</html>
