<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      margin: 0;
      padding: 0;
      color: white;
    }
    .phone {
      max-width: 420px;
      margin: 20px auto;
      background: white;
      color: black;
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      border: 12px solid var(--black);
      min-height: 680px;
    }
    .header {
      background: var(--black);
      color: var(--yellow);
      padding: 12px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-menu {
      display: flex;
      background: #222;
      padding: 10px;
    }
    .nav-btn {
      flex: 1;
      padding: 12px;
      text-align: center;
      color: white;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      margin: 0 5px;
      font-size: 13.5px;
    }
    .nav-btn.active {
      background: var(--yellow);
      color: var(--black);
    }
    .container { padding: 15px; }
    h2 { text-align: center; color: var(--black); margin: 20px 0 15px; }
    .question {
      background: white;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      border-left: 5px solid var(--yellow);
    }
    .options {
      display: flex;
      gap: 8px;
      margin: 10px 0;
    }
    .options button {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .options button.active {
      background: var(--yellow);
      color: var(--black);
      font-weight: bold;
    }
    textarea {
      width: 100%;
      height: 70px;
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button#main-btn {
      background: var(--black);
      color: var(--yellow);
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      width: 100%;
      margin: 25px 0 10px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="nav-menu">
      <a href="index.html" class="nav-btn">📋 Nouvel Audit</a>
      <a href="grille-detaillee.html" class="nav-btn active">📋 Grille Détaillée</a>
      <a href="dashboard.html" class="nav-btn">📊 KPI</a>
    </div>

    <div class="container">
      <h2>Grille d'Audit Terrain Détaillée</h2>

      <!-- Ici on mettra toutes les questions de la grille -->
      <div class="question">
        <strong>1) Plan de prévention (PdP)</strong><br><br>
        Affiché avec ses annexes ?<br>
        <div class="options" id="q1"></div>
        <textarea placeholder="Remarques / Actions correctives"></textarea>
      </div>

      <!-- Autres questions à venir... -->

      <button id="main-btn" onclick="sauvegarderGrille()">✅ Sauvegarder la Grille Détaillée</button>
    </div>
  </div>

  <script>
    function createOptions(containerId) {
      const container = document.getElementById(containerId);
      container.innerHTML = `
        <button onclick="selectOption(this)" data-value="Oui">Oui</button>
        <button onclick="selectOption(this)" data-value="Non">Non</button>
        <button onclick="selectOption(this)" data-value="NC">NC</button>
      `;
    }

    function selectOption(btn) {
      const parent = btn.parentElement;
      Array.from(parent.children).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }

    window.onload = () => {
      createOptions('q1');
    };

    async function sauvegarderGrille() {
      alert("✅ Grille détaillée sauvegardée !");
    }
  </script>
</body>
</html>
