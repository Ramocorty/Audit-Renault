<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grille Détaillée - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background:var(--black); color:var(--yellow); padding:15px 20px; display:flex; align-items:center; justify-content:space-between; }
    .nav-menu { display:flex; background:#222; padding:10px; }
    .nav-btn { flex:1; padding:12px; text-align:center; color:white; text-decoration:none; font-weight:bold; border-radius:8px; margin:0 5px; font-size:13.5px; }
    .nav-btn.active { background:var(--yellow); color:var(--black); }
    .container { padding:15px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 15px; }
    .section { background:#f8f8f8; padding:15px; border-radius:12px; margin-bottom:20px; }
    .result { margin:20px 0; padding:15px; background:#e8f5e9; border-radius:12px; text-align:center; font-size:18px; font-weight:bold; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="nav-menu">
      <a href="index-form.html" class="nav-btn">📋 Audit Simple</a>
      <a href="grille-detaillee.html" class="nav-btn active">📋 Grille Détaillée</a>
      <a href="photo.html" class="nav-btn">📸 Photo IA</a>
      <a href="dashboard.html" class="nav-btn">📊 KPI</a>
    </div>

    <div class="container">
      <!-- ... (le reste du formulaire reste identique) ... -->
      <!-- Je garde la structure que tu avais, mais je simplifie pour la réponse -->

      <div id="saveResult" class="result" style="display:none;"></div>

      <button id="main-btn" onclick="sauvegarderGrille()">✅ Sauvegarder la Grille Détaillée</button>
    </div>
  </div>

  <script>
    // ... (tes fonctions createOptions et selectOption restent les mêmes)

    async function sauvegarderGrille() {
      const lieu = document.getElementById('lieu').value;
      if (!lieu) return alert("Veuillez choisir un lieu");

      const data = { type: "grille_detaillee", lieu: lieu, dateHeureVisite: document.getElementById('dateHeure').value || new Date().toISOString() };

      let ouiCount = 0;
      for (let i = 1; i <= 26; i++) {
        const btn = document.querySelector(`#q${i} button.active`);
        data[`q${i}`] = btn ? btn.dataset.value : "NC";
        if (data[`q${i}`] === "Oui") ouiCount++;
      }

      const conformite = Math.round((ouiCount / 26) * 100);

      try {
        const response = await fetch('/api/audits', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await response.json();

        if (result.success) {
          document.getElementById('saveResult').innerHTML = `
            ✅ Grille enregistrée avec succès !<br>
            <strong>Conformité : ${conformite}% (${ouiCount}/26)</strong>
          `;
          document.getElementById('saveResult').style.display = 'block';
          alert(`Grille sauvegardée ! Conformité : ${conformite}%`);
        }
      } catch (e) {
        alert("❌ Erreur lors de la sauvegarde");
      }
    }

    window.onload = () => {
      if (!localStorage.getItem('userEmail')) window.location.href = "index.html";
      for (let i = 1; i <= 26; i++) createOptions('q' + i);
    };
  </script>
</body>
</html>
