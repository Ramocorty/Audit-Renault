<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grille Détaillée - Renault Audit</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background:var(--black); color:var(--yellow); padding:15px 20px; display:flex; align-items:center; justify-content:space-between; }
    .nav-menu { display:flex; background:#222; padding:10px; }
    .nav-btn { flex:1; padding:12px; text-align:center; color:white; text-decoration:none; font-weight:bold; border-radius:8px; margin:0 5px; font-size:13.5px; }
    .nav-btn.active { background:var(--yellow); color:var(--black); }
    .container { padding:15px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 15px; }
    .question { background:white; padding:12px; border-radius:10px; margin-bottom:12px; border-left:5px solid var(--yellow); }
    .options { display:flex; gap:8px; margin-top:8px; }
    .options button { flex:1; padding:10px; font-size:14px; border:none; border-radius:8px; cursor:pointer; }
    .options button.active { background:var(--yellow); color:var(--black); font-weight:bold; }
    button#main-btn { background:var(--black); color:var(--yellow); padding:16px; font-size:18px; font-weight:bold; border:none; border-radius:12px; width:100%; margin:25px 0; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="nav-menu">
      <a href="index.html" class="nav-btn">🏠 Accueil</a>
      <a href="grille-detaillee.html" class="nav-btn active">📋 Grille</a>
      <a href="dashboard.html" class="nav-btn">📊 KPI</a>
    </div>

    <div class="container">
      <h2>Grille d'Audit Terrain Détaillée</h2>
      <!-- Tes questions ici... -->

      <button id="main-btn" onclick="sauvegarderGrille()">✅ Sauvegarder la Grille Détaillée</button>
    </div>
  </div>

  <script>
    // Ton code existant pour les questions...

    async function sauvegarderGrille() {
      // Ton code de sauvegarde...
      alert("✅ Grille sauvegardée !");
    }

    // === VÉRIFICATION DE SESSION ===
    window.onload = () => {
      if (!localStorage.getItem('userEmail')) {
        window.location.href = "index.html";
      }
    };
  </script>
</body>
</html>
