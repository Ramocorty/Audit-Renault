<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRAIN VISION</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    body { font-family: Arial; background: #1a1a1a; color: white; padding: 10px; }
    .phone { max-width: 400px; margin: 20px auto; background: white; color: black; border-radius: 20px; padding: 15px; }
    button, input { padding: 12px; margin: 8px 0; width: 100%; font-size: 16px; }
    #result { margin-top: 20px; padding: 15px; background: #f0f0f0; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="phone">
    <h1>🌟 TERRAIN VISION - Renault</h1>

    <p><strong>1. Charger PDF</strong></p>
    <input type="file" id="pdfInput" accept="application/pdf">

    <p><strong>2. Prendre Photo</strong></p>
    <button onclick="takePhoto()">📷 Ouvrir Caméra</button>
    <video id="camera" autoplay playsinline style="width:100%; display:none;"></video>
    <img id="photoPreview" style="width:100%; display:none;">
    <button id="captureBtn" onclick="capturePhoto()" style="display:none;">✅ Capturer</button>

    <div id="result" style="display:none;">
      <h2>Rapport Audit</h2>
      <p><strong>Lieu :</strong> <span id="lieu">-</span></p>
      <p><strong>Entreprise :</strong> <span id="entreprise">-</span></p>
      <p><strong>Opération :</strong> <span id="operation">-</span></p>
      <p><strong>Date :</strong> <span id="date">-</span></p>
      <p><strong>Taux :</strong> <span id="taux">92%</span></p>
      <p><strong>Détail :</strong> <span id="detail">Zone encombrée détectée</span></p>
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    // PDF
    document.getElementById('pdfInput').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(ev) {
        const pdf = await pdfjsLib.getDocument(new Uint8Array(ev.target.result)).promise;
        let text = "";
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();
          content.items.forEach(item => text += item.str + " ");
        }

        document.getElementById('result').style.display = 'block';
        document.getElementById('lieu').textContent = text.includes("CTL") || text.includes("Hardy") ? "LARDY" : "Non détecté";
        document.getElementById('entreprise').textContent = text.match(/EIFFAGE|COOPER|KES CHEMISY/i) ? text.match(/EIFFAGE|COOPER|KES CHEMISY/i)[0] : "EIFFAGE";
        document.getElementById('operation').textContent = "Travaux détectés";
        document.getElementById('date').textContent = "10/04/2026";
      };
      reader.readAsArrayBuffer(file);
    });

    // Caméra
    async function takePhoto() {
      const video = document.getElementById('camera');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        video.style.display = 'block';
        document.getElementById('captureBtn').style.display = 'block';
      } catch(err) {
        alert("Erreur caméra - Utilise Cloudflare Pages (HTTPS)");
      }
    }

    function capturePhoto() {
      const video = document.getElementById('camera');
      const canvas = document.createElement('canvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      
      document.getElementById('photoPreview').src = canvas.toDataURL('image/jpeg');
      document.getElementById('photoPreview').style.display = 'block';
      video.style.display = 'none';
      document.getElementById('captureBtn').style.display = 'none';
    }
  </script>
</body>
</html>
