<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRAIN VISION - Renault</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">
  <style>
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:10px; color:white; }
    .phone { max-width: 420px; margin:20px auto; background:white; color:black; border-radius:30px; overflow:hidden; box-shadow:0 10px 30px rgba(0,0,0,0.6); }
    .header { background:#000; color:#efdf00; padding:20px; text-align:center; font-size:24px; font-weight:bold; }
    .container { padding:20px; }
    label { display:block; margin:15px 0 6px; font-weight:bold; }
    input, select { width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; font-size:16px; }
    button { background:#000; color:#efdf00; padding:16px; font-size:18px; font-weight:bold; border:none; border-radius:12px; width:100%; margin:20px 0; }
    .section { background:#f8f8f8; padding:18px; border-radius:12px; margin-bottom:20px; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">🌟 TERRAIN VISION</div>
    
    <div class="container">
      <h2 style="text-align:center;">Nouvel Audit Terrain</h2>

      <div class="section">
        <label>Lieu d'intervention</label>
        <select id="lieu">
          <option value="">-- Choisir le site --</option>
          <option value="LARDY (CTL)">LARDY (CTL)</option>
          <option value="VSF">VSF</option>
          <option value="TCR">TCR</option>
          <option value="CRI">CRI</option>
          <option value="CTA">CTA</option>
          <option value="KIN">KIN</option>
        </select>

        <label>Date et heure</label>
        <input type="datetime-local" id="dateHeure">

        <label>Opération réalisée</label>
        <input type="text" id="operation" placeholder="Ex: Travaux de rénovation">

        <label>Numéro de plan de prévention</label>
        <input type="text" id="plan" placeholder="Ex: 9290-2026-1">
      </div>

      <div class="section">
        <label>Chargé d'affaires Renault</label>
        <input type="text" id="charge" placeholder="Nom Prénom">

        <label>Entreprise Rang 1</label>
        <input type="text" id="ent1" placeholder="Ex: EIFFAGE">

        <label>Entreprise Rang 2</label>
        <input type="text" id="ent2" placeholder="Ex: ITGC">
      </div>

      <button onclick="validerAudit()">✅ Valider l'Audit</button>
    </div>
  </div>

  <script>
    function validerAudit() {
      const lieu = document.getElementById('lieu').value;
      if (!lieu) {
        alert("Veuillez choisir un lieu d'intervention");
        return;
      }
      alert("✅ Audit sauvegardé avec succès !");
      console.log("Audit enregistré");
    }
  </script>
</body>
</html>
