<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Renault Audit Terrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #001a4d;
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .phone {
      width: 390px;
      height: 844px;
      background: #002d62;
      border-radius: 50px;
      overflow: hidden;
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      border: 8px solid #001a4d;
      position: relative;
    }
    .topbar {
      background: #001a4d;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #ffcc00;
    }
    .topbar img {
      height: 45px;
    }
    .topbar-brand {
      font-size: 22px;
      font-weight: bold;
      margin-top: 8px;
      color: #ffcc00;
    }
    .scroll {
      height: calc(100% - 140px);
      overflow-y: auto;
      padding: 20px;
    }
    .hero-banner {
      background: linear-gradient(135deg, #001a4d, #003399);
      border: 2px solid #ffcc00;
      border-radius: 15px;
      padding: 25px;
      text-align: center;
      margin-bottom: 25px;
    }
    .hero-title {
      font-size: 28px;
      font-weight: bold;
      margin: 15px 0;
    }
    .hero-cta {
      background: #ffcc00;
      color: #001a4d;
      border: none;
      padding: 14px 30px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 8px;
      margin-top: 15px;
      cursor: pointer;
    }
    .metric-cell {
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
    }
    .metric-val {
      font-size: 32px;
      font-weight: bold;
    }
    .upload-zone {
      border: 3px dashed #ffcc00;
      border-radius: 15px;
      padding: 40px 20px;
      text-align: center;
      margin: 20px 0;
      cursor: pointer;
    }
    .scan-btn {
      background: #ffcc00;
      color: #001a4d;
      border: none;
      padding: 18px;
      font-size: 18px;
      font-weight: bold;
      width: 100%;
      border-radius: 12px;
      margin-top: 20px;
      cursor: pointer;
    }
    .bottom-nav {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #001a4d;
      display: flex;
      justify-content: space-around;
      padding: 12px 0;
      border-top: 1px solid #ffcc00;
    }
    .nav-item {
      text-align: center;
      color: white;
      cursor: pointer;
    }
    .nav-item span {
      font-size: 24px;
      display: block;
    }
  </style>
</head>
<body>

  <div class="phone">

    <!-- Top Bar -->
    <div class="topbar">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Renault_2024.svg/2560px-Renault_2024.svg.png" alt="Renault">
      <div class="topbar-brand">AUDIT TERRAIN</div>
    </div>

    <!-- HOME SCREEN -->
    <div class="scroll" id="homeScreen">
      <div class="hero-banner">
        <h2>Visite Terrain</h2>
        <p style="margin:15px 0; font-size:18px;">Entreprises Extérieures</p>
        <button class="hero-cta" onclick="goToScan()">NOUVEL AUDIT</button>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px;">
        <div class="metric-cell">
          <div class="metric-val" style="color:#ffcc00">18</div>
          <div>Audits</div>
        </div>
        <div class="metric-cell">
          <div class="metric-val" style="color:#00ff88">94%</div>
          <div>Conformité</div>
        </div>
        <div class="metric-cell">
          <div class="metric-val" style="color:#ff4444">3</div>
          <div>Non OK</div>
        </div>
      </div>
    </div>

    <!-- SCAN SCREEN -->
    <div class="scroll" id="scanScreen" style="display:none">
      <h2 style="text-align:center; margin-bottom:20px; color:#ffcc00">Nouvel Audit</h2>
      
      <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
        📄<br>
        <strong>Clique ici pour importer</strong><br>
        <small>PDF ou Photo du formulaire rempli</small>
      </div>

      <input type="file" id="fileInput" accept="application/pdf,image/*" style="display:none" onchange="handleFile(this)">

      <button class="scan-btn" onclick="simulateAnalysis()">ANALYSER LE DOCUMENT</button>
    </div>

    <!-- RESULT SCREEN -->
    <div class="scroll" id="resultScreen" style="display:none">
      <h2 style="color:#ffcc00; text-align:center">Résultat Audit</h2>
      <div id="resultContent" style="margin-top:20px"></div>
    </div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
      <div class="nav-item" onclick="goToHome()"><span>🏠</span><div>Accueil</div></div>
      <div class="nav-item" onclick="goToScan()"><span>📋</span><div>Audit</div></div>
      <div class="nav-item"><span>📊</span><div>Stats</div></div>
    </div>

  </div>

  <script>
    function goToHome() {
      document.getElementById('homeScreen').style.display = 'block';
      document.getElementById('scanScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'none';
    }

    function goToScan() {
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('scanScreen').style.display = 'block';
      document.getElementById('resultScreen').style.display = 'none';
    }

    function handleFile(input) {
      if (input.files.length > 0) {
        alert("Fichier reçu : " + input.files[0].name + "\n\nSimulation d'analyse en cours...");
        simulateAnalysis();
      }
    }

    function simulateAnalysis() {
      document.getElementById('scanScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'block';

      const resultHTML = `
        <div style="background:#003399; padding:20px; border-radius:15px; border:2px solid #ffcc00;">
          <h3 style="color:#ffcc00">✅ Audit CTL - Bâtiment 125</h3>
          <p><strong>Entreprise :</strong> EIFFAGE</p>
          <p><strong>Date :</strong> 10/04/2026</p>
          <p><strong>Taux de conformité :</strong> <span style="color:#00ff88; font-size:28px; font-weight:bold">94.4%</span></p>
          <hr style="border-color:#ffcc00">
          <p><strong>Points non conformes :</strong> 1</p>
          <p style="color:#ffaa00">Zone de travail non suffisamment dégagée pour la PRL</p>
        </div>
      `;
      document.getElementById('resultContent').innerHTML = resultHTML;
    }

    // Initialisation
    window.onload = function() {
      document.getElementById('homeScreen').style.display = 'block';
    };
  </script>
</body>
</html>
