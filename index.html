<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      margin: 0;
      padding: 0;
      color: white;
      display: flex;
      justify-content: center;
    }
    .phone {
      max-width: 420px;
      width: 100%;
      background: white;
      color: black;
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      border: 12px solid var(--black);
      min-height: 680px;
    }
    .header {
      background: var(--black);
      color: var(--yellow);
      padding: 20px;
      text-align: center;
    }
    .container { padding: 30px 20px; }
    h1 { color: var(--black); margin-bottom: 10px; }
    .choice {
      background: #f8f8f8;
      padding: 20px;
      margin: 15px 0;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }
    .choice:hover, .choice.active {
      border-color: var(--yellow);
      background: #fff;
      transform: scale(1.02);
    }
    input {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }
    button {
      background: var(--black);
      color: var(--yellow);
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      width: 100%;
      margin-top: 25px;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="container">
      <h2>Identification</h2>
      <p style="text-align:center; color:#555; margin-bottom:25px;">Qui êtes-vous ?</p>

      <div class="choice" id="interne" onclick="selectType('interne')">
        <h3>👨‍💼 Interne Renault</h3>
        <input type="email" id="emailInterne" placeholder="votre.nom@renault.com" style="display:none;">
      </div>

      <div class="choice" id="externe" onclick="selectType('externe')">
        <h3>🏗️ Extérieur / Entreprise</h3>
        <input type="email" id="emailExterne" placeholder="votre.email@entreprise.com" style="display:none;">
      </div>

      <button onclick="validerLogin()" id="btnLogin" style="display:none;">Continuer →</button>
    </div>
  </div>

  <script>
    let userType = '';

    function selectType(type) {
      userType = type;
      document.getElementById('interne').classList.remove('active');
      document.getElementById('externe').classList.remove('active');
      document.getElementById(type).classList.add('active');

      document.getElementById('emailInterne').style.display = type === 'interne' ? 'block' : 'none';
      document.getElementById('emailExterne').style.display = type === 'externe' ? 'block' : 'none';
      document.getElementById('btnLogin').style.display = 'block';
    }

    async function validerLogin() {
      let email = '';

      if (userType === 'interne') {
        email = document.getElementById('emailInterne').value.trim();
        if (!email.endsWith('@renault.com') && !email.endsWith('@renaultgroup.com')) {
          alert("❌ Veuillez utiliser un email Renault (@renault.com)");
          return;
        }
      } else if (userType === 'externe') {
        email = document.getElementById('emailExterne').value.trim();
        if (!email || !email.includes('@')) {
          alert("❌ Veuillez entrer un email valide");
          return;
        }
      }

      if (!email) {
        alert("Veuillez entrer votre email");
        return;
      }

      // Envoi des données de connexion à la base
      try {
        await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            type: userType,
            dateConnexion: new Date().toISOString()
          })
        });
      } catch (e) {
        console.log("Erreur d'enregistrement login (non bloquante)");
      }

      // Sauvegarde locale + redirection
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userType', userType);
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
