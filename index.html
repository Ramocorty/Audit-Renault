<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AUDIT TERRAIN - Renault</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root { --blue: #002C5F; --yellow: #FFD100; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
   
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      padding: 20px;
    }
   
    .phone {
      width: 390px;
      background: white;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.25);
      border: 12px solid #111;
    }
   
    .header {
      background: var(--blue);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
   
    .header h1 { font-size: 19px; font-weight: bold; }
    .logo { height: 32px; }

    .upload-area {
      padding: 25px;
      text-align: center;
      border: 2px dashed #ccc;
      margin: 20px;
      border-radius: 15px;
      background: #fafafa;
    }

    .content { padding: 10px 20px 20px; }
   
    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .info { margin: 8px 0; }
    .info strong { color: #002C5F; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <h1>AUDIT TERRAIN</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Renault_2021.svg/320px-Renault_2021.svg.png" class="logo" alt="Renault">
  </div>

  <div class="upload-area" id="uploadArea">
    <p><strong>Glisse ton PDF ici</strong><br>ou clique pour sélectionner</p>
    <input type="file" id="pdfInput" accept="application/pdf" style="margin-top:10px;">
  </div>

  <div class="content" id="result" style="display:none;">
    <div class="card">
      <h2 style="color:#002C5F; margin-bottom:15px;">✅ Résultat Audit</h2>
     
      <div class="info"><strong id="audit-title">Audit CTL</strong></div>
      <div class="info"><strong>Lieu :</strong> <span id="lieu">—</span></div>
      <div class="info"><strong>Entreprise :</strong> <span id="entreprise">—</span></div>
      <div class="info"><strong>Opération :</strong> <span id="operation">—</span></div>
      <div class="info"><strong>Date :</strong> <span id="date">—</span></div>
     
      <hr style="margin:18px 0;">
     
      <div class="info"><strong>Taux de conformité :</strong> <span id="taux" style="color:#28a745; font-weight:bold;">—</span></div>
      <div class="info"><strong>Points non conformes :</strong> <span id="nonconformes" style="color:#dc3545; font-weight:bold;">0</span></div>
      <div class="info"><strong>Détail NC :</strong> <span id="detail" style="color:#dc3545;">—</span></div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

document.getElementById('pdfInput').addEventListener('change', handlePDF);

async function handlePDF(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const typedarray = new Uint8Array(ev.target.result);
    const pdf = await pdfjsLib.getDocument(typedarray).promise;
   
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      textContent.items.forEach(item => fullText += " " + item.str);
    }

    extractAuditData(fullText);
  };
  reader.readAsArrayBuffer(file);
}

function extractAuditData(text) {
  document.getElementById('result').style.display = 'block';

  // === Extraction des champs ===
  const lieuMatch = text.match(/Lieu d'intervention\s*:\s*(.+?)(?=\s*Date|$)/i);
  const dateMatch = text.match(/Date et heure.*:\s*(.+?)(?=\s*Opération|$)/i);
  const opMatch = text.match(/Opération réalisée\s*:\s*(.+?)(?=\s*Numéro|$)/i);
  const entrepriseMatch = text.match(/EIFFAGE|COOPER|BOVIT|KES CHEMISY/i);

  // Recherche des non-conformités (NC)
  const ncMatches = (text.match(/NC/g) || []).length;
  const remarques = text.match(/Remarque|actions correctives|dégagée|espace|bureau|non suffisamment/i) || [];

  let detailNC = "Aucune non-conformité majeure détectée";
  if (text.toLowerCase().includes("dégagée") || text.toLowerCase().includes("espace")) {
    detailNC = "Zone de travail non suffisamment dégagée pour la PRL";
  } else if (ncMatches > 0) {
    detailNC = `${ncMatches} NC détectées (Produits chimiques, balisage, etc.)`;
  }

  // Calcul du taux de conformité (estimation)
  const totalChecks = 25; // estimation moyenne des cases
  const taux = Math.max(65, 100 - (ncMatches * 8));

  // Mise à jour de l'interface
  document.getElementById('audit-title').textContent = `Audit CTL - ${lieuMatch ? lieuMatch[1].trim().substring(0,35) : 'Site inconnu'}`;
  document.getElementById('lieu').textContent = lieuMatch ? lieuMatch[1].trim() : 'Non détecté';
  document.getElementById('date').textContent = dateMatch ? dateMatch[1].trim() : 'Non détecté';
  document.getElementById('operation').textContent = opMatch ? opMatch[1].trim() : 'Non détectée';
  document.getElementById('entreprise').textContent = entrepriseMatch ? entrepriseMatch[0] : 'EIFFAGE';

  document.getElementById('taux').textContent = `${taux}%`;
  document.getElementById('nonconformes').textContent = ncMatches || '0';
  document.getElementById('detail').textContent = detailNC;
}
</script>
</body>
</html>
