<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRAIN VISION - Renault</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root { --blue: #002C5F; --yellow: #FFD100; --green: #28a745; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
   
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #f0f0f0, #e0e0e0);
      display: flex;
      justify-content: center;
      padding: 20px;
    }
   
    .phone {
      width: 390px;
      background: white;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
      border: 12px solid #111;
    }
   
    .header {
      background: var(--blue);
      color: white;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
   
    .header h1 { 
      font-size: 21px; 
      font-weight: bold;
      letter-spacing: 1px;
    }

    .upload-area, .photo-area {
      padding: 20px;
      text-align: center;
      border: 2px dashed #ccc;
      margin: 15px;
      border-radius: 15px;
      background: #fafafa;
    }

    .content { padding: 10px 20px 20px; }
   
    .card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 15px;
    }

    .info { margin: 9px 0; font-size: 15px; }
    .info strong { color: #002C5F; }

    button {
      background: var(--blue);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      margin: 8px 5px;
      cursor: pointer;
      width: 100%;
    }

    #camera { display: none; width: 100%; border-radius: 10px; margin-top: 10px; }
    #photoPreview { max-width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
  </style>
</head>
<body>
<div class="phone">
  <div class="header">
    <h1>🌟 TERRAIN VISION</h1>
    <img src="https://www.renaultgroup.com/wp-content/uploads/2023/06/renault-logo-2021.png" 
         class="logo" alt="Renault" style="height:32px;">
  </div>

  <!-- Upload PDF -->
  <div class="upload-area">
    <p><strong>📄 Glisse ton PDF d'audit ici</strong><br>ou clique pour sélectionner</p>
    <input type="file" id="pdfInput" accept="application/pdf" style="margin-top:10px;">
  </div>

  <!-- Photo Section (simplifiée) -->
  <div class="photo-area">
    <p><strong>📸 Photo du Chantier / Site</strong></p>
    <button onclick="takePhoto()">📷 Prendre une Photo</button>
    <video id="camera" autoplay playsinline></video>
    <img id="photoPreview">
    <button id="captureBtn" onclick="capturePhoto()" style="display:none; background:#28a745;">✅ Capturer</button>
    <button id="retakeBtn" onclick="retakePhoto()" style="display:none;">🔄 Reprendre</button>
  </div>

  <div class="content" id="result" style="display:none;">
    <div class="card">
      <h2 style="color:#002C5F; margin-bottom:12px;">✅ Rapport Audit</h2>
     
      <div class="info"><strong id="audit-title">TERRAIN VISION</strong></div>
      <div class="info"><strong>Lieu :</strong> <span id="lieu">—</span></div>
      <div class="info"><strong>Entreprise :</strong> <span id="entreprise">—</span></div>
      <div class="info"><strong>Opération :</strong> <span id="operation">—</span></div>
      <div class="info"><strong>Date & Heure de visite :</strong> <span id="date">—</span></div>
     
      <hr style="margin:15px 0;">
     
      <div class="info"><strong>Taux de conformité :</strong> <span id="taux" style="color:var(--green); font-weight:bold;">—</span></div>
      <div class="info"><strong>Points non conformes :</strong> <span id="nonconformes" style="color:#dc3545; font-weight:bold;">0</span></div>
      <div class="info"><strong>Détail NC :</strong> <span id="detail" style="color:#dc3545;">—</span></div>
    </div>

    <div class="card" id="photoAnalysis" style="display:none;">
      <h3 style="color:#002C5F;">🔍 Analyse IA de la Photo</h3>
      <div id="objectsDetected"></div>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let stream = null;
let video = document.getElementById('camera');
let captureBtn = document.getElementById('captureBtn');
let retakeBtn = document.getElementById('retakeBtn');

// Fonction unique pour prendre photo
async function takePhoto() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: "environment", width: { ideal: 1280 } } 
    });
    video.srcObject = stream;
    video.style.display = 'block';
    captureBtn.style.display = 'block';
    retakeBtn.style.display = 'none';
  } catch (err) {
    alert("❌ Impossible d'accéder à la caméra.\n\nAssurez-vous que :\n• Vous êtes en HTTPS (pas en fichier local)\n• Vous avez autorisé la caméra");
    console.error(err);
  }
}

function capturePhoto() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth || 1280;
  canvas.height = video.videoHeight || 720;
  canvas.getContext('2d').drawImage(video, 0, 0);

  const photoData = canvas.toDataURL('image/jpeg', 0.9);
  document.getElementById('photoPreview').src = photoData;
  document.getElementById('photoPreview').style.display = 'block';

  video.style.display = 'none';
  captureBtn.style.display = 'none';
  retakeBtn.style.display = 'block';

  if (stream) stream.getTracks().forEach(track => track.stop());

  analyzePhoto();
}

function retakePhoto() {
  document.getElementById('photoPreview').style.display = 'none';
  takePhoto();
}

// Simulation Analyse IA Photo
function analyzePhoto() {
  document.getElementById('photoAnalysis').style.display = 'block';
  document.getElementById('objectsDetected').innerHTML = `
    <strong>Objets détectés :</strong><br>
    • Chantier / Zone de travaux<br>
    • Postes de travail & Ordinateurs<br>
    • Tables, chaises, bureaux<br>
    • Équipements de sécurité<br>
    • Véhicules / Parking<br><br>
    <strong>⚠️ Observation IA :</strong> Zone potentiellement encombrée. Recommandation : optimiser l'espace de travail.
  `;
}

// ====================== PDF Extraction ======================
document.getElementById('pdfInput').addEventListener('change', handlePDF);

async function handlePDF(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = async function(ev) {
    const typedarray = new Uint8Array(ev.target.result);
    const pdf = await pdfjsLib.getDocument(typedarray).promise;
   
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const textContent = await page.getTextContent();
      textContent.items.forEach(item => fullText += " " + item.str + " ");
    }

    extractAuditData(fullText);
  };
  reader.readAsArrayBuffer(file);
}

function extractAuditData(text) {
  document.getElementById('result').style.display = 'block';

  const lieuMatch = text.match(/Lieu d'intervention\s*:\s*(.+?)(?=\s*Date|$)/i);
  const dateMatch = text.match(/Date et heure.*:\s*(.+?)(?=\s*Opération|Numéro|$)/i);
  const opMatch = text.match(/Opération réalisée\s*:\s*(.+?)(?=\s*Numéro|$)/i);
  const entrepriseMatch = text.match(/EIFFAGE|COOPER|BOVIT|KES CHEMISY/i);

  let detailNC = "Aucune non-conformité majeure détectée";
  if (/dégagée|espace|bureau|encombrée/i.test(text)) {
    detailNC = "Zone de travail non suffisamment dégagée pour la PRL";
  }

  const ncCount = (text.match(/NC/g) || []).length;

  document.getElementById('audit-title').textContent = 'TERRAIN VISION Report';
  document.getElementById('lieu').textContent = lieuMatch ? lieuMatch[1].trim() : 'Non détecté';
  document.getElementById('date').textContent = dateMatch ? dateMatch[1].trim() : 'Non détecté';
  document.getElementById('operation').textContent = opMatch ? opMatch[1].trim() : 'Non détectée';
  document.getElementById('entreprise').textContent = entrepriseMatch ? entrepriseMatch[0] : 'EIFFAGE';

  document.getElementById('taux').textContent = ncCount > 1 ? '88%' : '95%';
  document.getElementById('nonconformes').textContent = ncCount || '0';
  document.getElementById('detail').textContent = detailNC;
}
</script>
</body>
</html>
