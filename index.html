<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Renault Audit</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">
</head>
<body style="font-family:Arial;background:#1a1a1a;margin:0;padding:0;color:white;display:flex;justify-content:center;">
  <div style="max-width:420px;width:100%;background:white;color:black;border-radius:35px;overflow:hidden;border:12px solid #000;box-shadow:0 20px 40px rgba(0,0,0,0.7);margin:20px auto;">
    <div style="background:#000;color:#efdf00;padding:25px;text-align:center;">
      <h1>Renault Audit Terrain</h1>
    </div>
    <div style="padding:40px 25px;">
      <h2 style="text-align:center;">Connexion</h2>

      <div onclick="selectType('interne')" id="interne" style="background:#f8f8f8;padding:20px;margin:15px 0;border-radius:15px;text-align:center;cursor:pointer;border:2px solid transparent;">
        <h3>👨‍💼 Interne Renault</h3>
        <input type="email" id="emailInterne" placeholder="nom.prenom@renault.com" style="display:none;width:100%;padding:12px;margin-top:10px;" oninput="checkReady()">
      </div>

      <div onclick="selectType('externe')" id="externe" style="background:#f8f8f8;padding:20px;margin:15px 0;border-radius:15px;text-align:center;cursor:pointer;border:2px solid transparent;">
        <h3>🏗️ Extérieur</h3>
        <input type="email" id="emailExterne" placeholder="votre.email@entreprise.com" style="display:none;width:100%;padding:12px;margin-top:10px;" oninput="checkReady()">
      </div>

      <button onclick="validerLogin()" id="btnLogin" disabled style="width:100%;padding:16px;background:#000;color:#efdf00;border:none;border-radius:12px;font-size:18px;margin-top:30px;">Se Connecter</button>
    </div>
  </div>

  <script>
    let userType = '';
    function selectType(type) {
      userType = type;
      document.getElementById('interne').style.borderColor = type === 'interne' ? '#efdf00' : 'transparent';
      document.getElementById('externe').style.borderColor = type === 'externe' ? '#efdf00' : 'transparent';
      document.getElementById('emailInterne').style.display = type === 'interne' ? 'block' : 'none';
      document.getElementById('emailExterne').style.display = type === 'externe' ? 'block' : 'none';
      checkReady();
    }
    function checkReady() {
      let email = '';
      if (userType === 'interne') email = document.getElementById('emailInterne').value.trim();
      if (userType === 'externe') email = document.getElementById('emailExterne').value.trim();
      document.getElementById('btnLogin').disabled = !(userType && email);
    }
    async function validerLogin() {
      let email = userType === 'interne' ? document.getElementById('emailInterne').value.trim() : document.getElementById('emailExterne').value.trim();
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userType', userType);
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
