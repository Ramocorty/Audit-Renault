<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRAIN VISION - Renault</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>🌟 TERRAIN VISION</h1>
      <img src="logo-renault.png" style="height:34px;" alt="Renault">
    </div>

    <!-- PDF -->
    <div class="section">
      <p><strong>📄 Charger PDF Audit</strong></p>
      <input type="file" id="pdfInput" accept="application/pdf">
    </div>

    <!-- Caméra -->
    <div class="section">
      <p><strong>📸 Photo du Chantier</strong></p>
      <button onclick="takePhoto()">📷 Ouvrir Caméra</button>
      <video id="camera" autoplay playsinline></video>
      <img id="photoPreview" style="max-width:100%; margin:10px 0;">
      <button id="captureBtn" onclick="capturePhoto()" style="display:none; background:#efdf00; color:black;">✅ Capturer</button>
      <button id="retakeBtn" onclick="retakePhoto()" style="display:none;">🔄 Reprendre</button>
    </div>

    <div class="content" id="result" style="display:none;">
      <div class="card">
        <h2>✅ Rapport Audit</h2>
        <div class="info"><strong>Lieu :</strong> <span id="lieu">—</span></div>
        <div class="info"><strong>Entreprise :</strong> <span id="entreprise">—</span></div>
        <div class="info"><strong>Opération :</strong> <span id="operation">—</span></div>
        <div class="info"><strong>Date :</strong> <span id="date">—</span></div>
        <div class="info"><strong>Taux :</strong> <span id="taux">—</span></div>
        <div class="info"><strong>Points NC :</strong> <span id="nonconformes">—</span></div>
        <div class="info"><strong>Détail :</strong> <span id="detail">—</span></div>
      </div>

      <div class="card" id="photoAnalysis" style="display:none;">
        <h3>🔍 Analyse Photo</h3>
        <div id="objectsDetected"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
