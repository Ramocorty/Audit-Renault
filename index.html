<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { 
      font-family: Arial, sans-serif; 
      background: linear-gradient(135deg, #1a1a1a, #2c2c2c); 
      margin:0; padding:0; color:white; 
      display:flex; justify-content:center; align-items:center; 
      min-height:100vh;
    }
    .phone { 
      max-width:420px; width:100%; background:white; color:black; 
      border-radius:35px; overflow:hidden; 
      box-shadow:0 20px 50px rgba(0,0,0,0.8); 
      border:14px solid var(--black); 
      min-height:680px;
    }
    .header { 
      background: linear-gradient(135deg, var(--black), #1f1f1f); 
      color: var(--yellow); 
      padding: 50px 20px 35px; 
      text-align:center; 
    }
    .logo { height: 95px; margin-bottom: 15px; }
    .title { font-size: 28px; font-weight: bold; margin: 10px 0 5px; }
    .subtitle { font-size: 16px; opacity: 0.85; }

    .container { padding: 30px 25px; }
    .choice { 
      background:#f8f8f8; 
      padding:22px; 
      margin:18px 0; 
      border-radius:16px; 
      text-align:center; 
      cursor:pointer; 
      border:3px solid transparent; 
      transition: all 0.3s;
    }
    .choice.active { 
      border-color:var(--yellow); 
      background:white; 
      box-shadow:0 0 0 5px rgba(239, 223, 0, 0.25);
    }
    input[type="email"] { 
      width:100%; padding:16px; margin-top:12px; 
      border:2px solid #ddd; border-radius:12px; font-size:16px; 
    }
    .consent { 
      margin:25px 0; padding:18px; background:#f8f8f8; 
      border-radius:12px; font-size:14.5px; line-height:1.5; 
    }
    button { 
      background:var(--black); color:var(--yellow); 
      padding:18px; font-size:18px; font-weight:bold; 
      border:none; border-radius:14px; width:100%; 
      margin-top:25px; 
    }
    button:disabled { background:#666; color:#aaa; }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <div class="title">Audit Terrain</div>
      <div class="subtitle">Sécurité & Conformité</div>
    </div>

    <div class="container">
      <h2 style="text-align:center; color:var(--black); margin-bottom:25px;">Identification</h2>

      <div class="choice" id="interneChoice" onclick="selectType('interne')">
        <h3>👷 Interne Renault</h3>
        <p>Employé du Groupe</p>
      </div>

      <div class="choice" id="externeChoice" onclick="selectType('externe')">
        <h3>🏗️ Prestataire Externe</h3>
        <p>Société partenaire</p>
      </div>

      <div id="emailInterne" style="display:none;">
        <label>Email Renault</label>
        <input type="email" id="emailInterneInput" placeholder="prenom.nom@renault.com" oninput="toggleButton()">
      </div>

      <div id="emailExterne" style="display:none;">
        <label>Votre Email Professionnel</label>
        <input type="email" id="emailExterneInput" placeholder="votre.email@entreprise.com" oninput="toggleButton()">
      </div>

      <div class="consent">
        <input type="checkbox" id="consentCheck" onchange="toggleButton()">
        <label for="consentCheck" style="display:inline; font-weight:normal;">
          J'accepte la collecte de mes données pour ce MVP Audit Renault (RGPD)
        </label>
      </div>

      <button id="btnLogin" disabled onclick="validerLogin()">Se Connecter</button>
    </div>
  </div>

  <script>
    let userType = null;

    function selectType(type) {
      userType = type;
      document.getElementById('interneChoice').classList.toggle('active', type === 'interne');
      document.getElementById('externeChoice').classList.toggle('active', type === 'externe');
      document.getElementById('emailInterne').style.display = type === 'interne' ? 'block' : 'none';
      document.getElementById('emailExterne').style.display = type === 'externe' ? 'block' : 'none';
      toggleButton();
    }

    function toggleButton() {
      const consent = document.getElementById('consentCheck').checked;
      let emailOk = false;
      if (userType === 'interne') emailOk = document.getElementById('emailInterneInput').value.trim() !== '';
      if (userType === 'externe') emailOk = document.getElementById('emailExterneInput').value.trim() !== '';
      document.getElementById('btnLogin').disabled = !(consent && userType && emailOk);
    }

    async function validerLogin() {
      const emailField = userType === 'interne' ? 'emailInterneInput' : 'emailExterneInput';
      const email = document.getElementById(emailField).value.trim();
      if (!email) return alert("Veuillez entrer votre email");

      try {
        await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, userType, consentRGPD: true, dateConnexion: new Date().toISOString() })
        });
      } catch (e) {}

      localStorage.setItem('userEmail', email);
      localStorage.setItem('userType', userType);
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
