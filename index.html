<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      margin: 0;
      padding: 0;
      color: white;
      display: flex;
      justify-content: center;
    }
    .phone {
      max-width: 420px;
      width: 100%;
      background: white;
      color: black;
      border-radius: 35px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.7);
      border: 12px solid var(--black);
      min-height: 680px;
    }
    .header {
      background: var(--black);
      color: var(--yellow);
      padding: 20px;
      text-align: center;
    }
    .container { padding: 30px 20px; }
    .choice {
      background: #f8f8f8;
      padding: 20px;
      margin: 15px 0;
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .choice.active {
      border-color: var(--yellow);
      background: #fff;
    }
    input[type="email"] {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: 2px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
    }
    .consent {
      margin: 20px 0;
      padding: 15px;
      background: #f8f8f8;
      border-radius: 10px;
      font-size: 14px;
    }
    button {
      background: var(--black);
      color: var(--yellow);
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      width: 100%;
      margin-top: 15px;
    }
    button:disabled {
      background: #666;
      color: #ccc;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="container">
      <h2>Connexion</h2>

      <div class="choice" id="interne" onclick="selectType('interne')">
        <h3>👨‍💼 Interne Renault</h3>
        <input type="email" id="emailInterne" placeholder="nom.prenom@renault.com" style="display:none;" oninput="toggleButton()">
      </div>

      <div class="choice" id="externe" onclick="selectType('externe')">
        <h3>🏗️ Extérieur</h3>
        <input type="email" id="emailExterne" placeholder="votre.email@entreprise.com" style="display:none;" oninput="toggleButton()">
      </div>

      <div class="consent">
        <input type="checkbox" id="consentCheck" onchange="toggleButton()">
        <label for="consentCheck"><strong>Consentement RGPD :</strong> J'accepte la collecte de mes données pour ce MVP et l'amélioration de l'application.</label>
      </div>

      <button onclick="validerLogin()" id="btnLogin" disabled>Se Connecter</button>
    </div>
  </div>

  <script>
    let userType = '';

    function selectType(type) {
      userType = type;
      document.querySelectorAll('.choice').forEach(c => c.classList.remove('active'));
      document.getElementById(type).classList.add('active');

      document.getElementById('emailInterne').style.display = type === 'interne' ? 'block' : 'none';
      document.getElementById('emailExterne').style.display = type === 'externe' ? 'block' : 'none';
      toggleButton();
    }

    function toggleButton() {
      const consent = document.getElementById('consentCheck').checked;
      let emailOk = false;

      if (userType === 'interne') {
        emailOk = document.getElementById('emailInterne').value.trim() !== '';
      } else if (userType === 'externe') {
        emailOk = document.getElementById('emailExterne').value.trim() !== '';
      }

      document.getElementById('btnLogin').disabled = !(consent && userType && emailOk);
    }

    async function validerLogin() {
      const emailField = userType === 'interne' ? 'emailInterne' : 'emailExterne';
      const email = document.getElementById(emailField).value.trim();

      if (!email) {
        alert("Veuillez entrer votre email");
        return;
      }

      // Envoi à la base
      try {
        await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            userType: userType,
            consentRGPD: true,
            dateConnexion: new Date().toISOString()
          })
        });
      } catch (e) {
        console.log("Erreur d'envoi login");
      }

      // Sauvegarde locale
      localStorage.setItem('userEmail', email);
      localStorage.setItem('userType', userType);

      // Redirection
      window.location.href = "home.html";
    }
  </script>
</body>
</html>
