<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background: linear-gradient(135deg, var(--black), #222); color: var(--yellow); padding: 25px 20px; text-align:center; }
    .logo { height: 70px; margin-bottom: 8px; }

    .container { padding: 20px; }
    h2 { text-align:center; color:var(--black); margin:25px 0 15px; }

    .map-container {
      position: relative;
      height: 290px;
      background: #d4e0d4 url('https://i.imgur.com/8vJqKzP.png') center/cover; /* Carte stylisée France / IDF */
      border-radius: 16px;
      margin: 15px 0;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      border: 3px solid #333;
    }
    .map-pin {
      position: absolute;
      font-size: 34px;
      cursor: pointer;
      transition: all 0.3s;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5));
    }
    .map-pin:hover { transform: scale(1.4); }
    .pin-label {
      position: absolute;
      background: white;
      color: #000;
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 20px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.4);
      white-space: nowrap;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <h2>Audit Terrain</h2>
    </div>

    <div class="container">
      <h2>Carte des Sites d'Audit</h2>
      
      <div class="map-container">
        <!-- Pins avec positions améliorées -->
        <div class="map-pin" style="top:35%; left:52%;" onclick="goToSite('TCR')">📍</div>
        <div class="pin-label" style="top:28%; left:42%;">TCR<br>Guyancourt</div>

        <div class="map-pin" style="top:48%; left:35%;" onclick="goToSite('VSF')">📍</div>
        <div class="pin-label" style="top:50%; left:22%;">VSF</div>

        <div class="map-pin" style="top:65%; left:48%;" onclick="goToSite('CTL')">📍</div>
        <div class="pin-label" style="top:68%; left:40%;">CTL - Lardy</div>

        <div class="map-pin" style="top:25%; left:72%;" onclick="goToSite('CRI')">📍</div>
        <div class="pin-label" style="top:20%; left:65%;">CRI / KIN</div>

        <div class="map-pin" style="top:58%; left:68%;" onclick="goToSite('CTA')">📍</div>
        <div class="pin-label" style="top:61%; left:70%;">CTA</div>
      </div>

      <p style="text-align:center; color:#555; margin-top:10px;">Cliquez sur les 📍 pour accéder au KPI du site</p>

      <h2 style="margin:30px 0 15px; text-align:center;">Accès Rapide</h2>

      <div onclick="goTo('index-form.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📋 Audit Simple
      </div>
      <div onclick="goTo('grille-detaillee.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📋 Grille Détaillée
      </div>
      <div onclick="goTo('photo.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📸 Photo + Analyse IA
      </div>
    </div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function goToSite(site) {
      localStorage.setItem('selectedSite', site);
      window.location.href = "dashboard.html";
    }

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) window.location.href = "index.html";
    };
  </script>
</body>
</html>
