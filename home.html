<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">
  
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background: linear-gradient(135deg, var(--black), #222); color: var(--yellow); padding: 25px 20px; text-align:center; }
    .logo { height: 70px; margin-bottom: 8px; }

    .container { padding: 20px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 15px; }

    #map { 
      height: 320px; 
      border-radius: 16px; 
      margin: 15px 0; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
  </style>
  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <h2>Audit Terrain</h2>
    </div>

    <div class="container">
      <h2>Carte des Sites Renault</h2>
      <div id="map"></div>

      <p style="text-align:center; color:#555; margin:10px 0;">Cliquez sur les marqueurs pour ouvrir le KPI du site</p>
    </div>
  </div>

  <script>
    // Initialisation de la carte centrée sur Île-de-France
    let map = L.map('map').setView([48.8, 2.1], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    // Sites avec coordonnées réelles
    const sites = [
      { name: "TCR", city: "Guyancourt", lat: 48.766, lng: 2.046, color: "red" },
      { name: "VSF", city: "Villiers-Saint-Frédéric", lat: 48.64, lng: 1.89, color: "blue" },
      { name: "CTL", city: "Lardy", lat: 48.52, lng: 2.25, color: "green" },
      { name: "CRI", city: "Boulogne-Billancourt", lat: 48.83, lng: 2.24, color: "purple" },
      { name: "KIN", city: "Boulogne-Billancourt", lat: 48.835, lng: 2.245, color: "purple" },
      { name: "CTA", city: "Aubevoye", lat: 49.17, lng: 1.33, color: "orange" }
    ];

    sites.forEach(site => {
      const marker = L.marker([site.lat, site.lng]).addTo(map);
      marker.bindPopup(`<b>${site.name}</b><br>${site.city}`);
      marker.on('click', () => {
        localStorage.setItem('selectedSite', site.name);
        window.location.href = "dashboard.html";
      });
    });

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) window.location.href = "index.html";
    };
  </script>
</body>
</html>
