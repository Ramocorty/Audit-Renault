<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { 
      background: linear-gradient(135deg, var(--black), #222); 
      color: var(--yellow); 
      padding: 25px 20px 20px; 
      text-align: center; 
    }
    .logo { height: 70px; margin-bottom: 10px; }
    .welcome { font-size: 22px; margin: 10px 0 5px; font-weight: bold; }
    .user { font-size: 16px; color: #ccc; }

    .container { padding: 25px 20px; }
    .card {
      background: #f8f8f8;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
      transition: all 0.3s;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
    .card-icon { font-size: 38px; width: 60px; }
    .card-content h3 { margin: 0 0 5px 0; color: var(--black); }
    .card-content p { margin: 0; color: #666; font-size: 14px; }

    button { 
      background: var(--black); 
      color: var(--yellow); 
      padding: 16px; 
      font-size: 17px; 
      font-weight: bold; 
      border: none; 
      border-radius: 12px; 
      width: 100%; 
      margin-top: 10px; 
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <div class="welcome">Bienvenue sur Audit Terrain</div>
      <div class="user" id="userDisplay">Chargement...</div>
    </div>

    <div class="container">
      <h2 style="text-align:center; color:var(--black); margin-bottom:25px;">Que souhaitez-vous faire ?</h2>

      <div class="card" onclick="goTo('index-form.html')">
        <div class="card-icon">📋</div>
        <div class="card-content">
          <h3>Audit Simple</h3>
          <p>Formulaire rapide avec signatures</p>
        </div>
      </div>

      <div class="card" onclick="goTo('grille-detaillee.html')">
        <div class="card-icon">📋</div>
        <div class="card-content">
          <h3>Grille Détaillée</h3>
          <p>26 points de contrôle complets</p>
        </div>
      </div>

      <div class="card" onclick="goTo('photo.html')">
        <div class="card-icon">📸</div>
        <div class="card-content">
          <h3>Photo + Analyse IA</h3>
          <p>Détection intelligente d'objets</p>
        </div>
      </div>

      <div class="card" onclick="goTo('dashboard.html')">
        <div class="card-icon">📊</div>
        <div class="card-content">
          <h3>Tableau de Bord KPI</h3>
          <p>Statistiques et conformité</p>
        </div>
      </div>

      <button onclick="logout()">🚪 Déconnexion</button>
    </div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function logout() {
      if (confirm("Voulez-vous vraiment vous déconnecter ?")) {
        localStorage.clear();
        window.location.href = "index.html";
      }
    }

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) {
        window.location.href = "index.html";
      } else {
        document.getElementById('userDisplay').textContent = email;
      }
    };
  </script>
</body>
</html>
