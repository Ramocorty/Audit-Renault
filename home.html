<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background: linear-gradient(135deg, var(--black), #222); color: var(--yellow); padding: 25px 20px; text-align:center; }
    .logo { height: 70px; margin-bottom: 8px; }

    .container { padding: 20px; }
    h2 { text-align:center; color:var(--black); margin:20px 0 15px; }

    #map { 
      height: 300px; 
      border-radius: 16px; 
      margin: 15px 0; 
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
  </style>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <h2>Audit Terrain</h2>
    </div>

    <div class="container">
      <h2>Carte des Sites d'Audit</h2>
      <div id="map"></div>

      <p style="text-align:center; color:#555; margin-top:10px;">Cliquez sur les marqueurs pour aller au KPI du site</p>
    </div>
  </div>

  <script>
    let map = L.map('map').setView([48.8, 2.0], 9);

    L.tileLayer('https://{s}.tile.openstreetmap.fr/osmfr/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    const sites = [
      { name: "TCR", full: "Techno-centre Guyancourt", lat: 48.766, lng: 2.046 },
      { name: "VSF", full: "Villiers Saint Fréderic", lat: 48.64, lng: 1.89 },
      { name: "CTL", full: "Lardy", lat: 48.52, lng: 2.25 },
      { name: "CRI", full: "Boulogne-Billancourt", lat: 48.83, lng: 2.24 },
      { name: "KIN", full: "Boulogne-Billancourt", lat: 48.835, lng: 2.245 },
      { name: "CTA", full: "Aubevoye", lat: 49.17, lng: 1.33 }
    ];

    sites.forEach(site => {
      const marker = L.marker([site.lat, site.lng]).addTo(map);
      
      // Popup avec nom complet
      marker.bindPopup(`<b>${site.name}</b><br>${site.full}`, {
        closeButton: false,
        offset: [0, -10]
      });

      // Au clic → aller au KPI avec filtre
      marker.on('click', () => {
        localStorage.setItem('selectedSite', site.name);
        window.location.href = "dashboard.html";
      });
    });

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) window.location.href = "index.html";
    };
  </script>
</body>
</html>
