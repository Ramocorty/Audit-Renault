<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background:var(--black); color:var(--yellow); padding:15px 20px; display:flex; align-items:center; justify-content:space-between; }
    .nav-menu { display:flex; background:#222; padding:10px; }
    .nav-btn { flex:1; padding:12px; text-align:center; color:white; text-decoration:none; font-weight:bold; border-radius:8px; margin:0 5px; font-size:13.5px; }
    .nav-btn.active { background:var(--yellow); color:var(--black); }
    .container { padding:30px 20px; text-align:center; }
    .user-info { background:#e8f5e9; color:#2e7d32; padding:12px; border-radius:10px; margin-bottom:25px; }
    .card { background:#f8f8f8; padding:25px 20px; margin:18px 0; border-radius:15px; box-shadow:0 4px 15px rgba(0,0,0,0.1); cursor:pointer; transition:all 0.2s; }
    .card:hover { transform:scale(1.03); }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <h1>Renault Audit Terrain</h1>
      <img src="logo-renault.png" height="45" alt="Renault">
    </div>

    <div class="nav-menu">
      <a href="index-form.html" class="nav-btn">📋 Audit Simple</a>
      <a href="grille-detaillee.html" class="nav-btn">📋 Grille Détaillée</a>
      <a href="dashboard.html" class="nav-btn">📊 KPI</a>
    </div>

    <div class="container">
      <div class="user-info">
        Connecté : <strong id="userDisplay"></strong>
      </div>

      <h2 style="color:var(--black);">Que souhaitez-vous faire ?</h2>

      <div class="card" onclick="window.location.href='index-form.html'">
        <h2>📋 Nouvel Audit Simple</h2>
        <p>Audit classique avec signatures</p>
      </div>

      <div class="card" onclick="window.location.href='grille-detaillee.html'">
        <h2>📋 Grille Détaillée</h2>
        <p>Audit complet avec 26 points de contrôle</p>
      </div>

      <div class="card" onclick="window.location.href='dashboard.html'">
        <h2>📊 Tableau de Bord KPI</h2>
        <p>Statistiques et conformité</p>
      </div>

      <button onclick="logout()" style="margin-top:40px;background:#666;color:white;padding:12px;width:100%;">Déconnexion</button>
    </div>
  </div>

  <script>
    function logout() {
      if (confirm("Voulez-vous vous déconnecter ?")) {
        localStorage.clear();
        window.location.href = "index.html";
      }
    }

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) {
        window.location.href = "index.html";
      } else {
        document.getElementById('userDisplay').textContent = email;
      }
    };
  </script>
</body>
</html>
