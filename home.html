<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil - Renault Audit Terrain</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#efdf00">

  <style>
    :root { --black: #000000; --yellow: #efdf00; }
    body { font-family: Arial, sans-serif; background: #1a1a1a; margin:0; padding:0; color:white; }
    .phone { max-width:420px; margin:20px auto; background:white; color:black; border-radius:35px; overflow:hidden; box-shadow:0 20px 40px rgba(0,0,0,0.7); border:12px solid var(--black); min-height:680px; }
    .header { background: linear-gradient(135deg, var(--black), #222); color: var(--yellow); padding: 25px 20px; text-align:center; }
    .logo { height: 70px; margin-bottom: 8px; }

    .container { padding: 20px; }
    h2 { text-align:center; color:var(--black); margin:25px 0 15px; }

    .map-container {
      position: relative;
      height: 280px;
      background: #f0f0f0;
      border-radius: 16px;
      margin: 15px 0;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      border: 2px solid #ddd;
    }
    .map-pin {
      position: absolute;
      font-size: 32px;
      cursor: pointer;
      transition: all 0.3s;
      text-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .map-pin:hover { transform: scale(1.35); }
    .pin-label {
      position: absolute;
      background: white;
      color: black;
      font-size: 13px;
      padding: 3px 10px;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      white-space: nowrap;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <img src="logo-renault.png" class="logo" alt="Renault">
      <h2>Audit Terrain</h2>
    </div>

    <div class="container">
      <h2>Choisissez un site d'intervention</h2>
      
      <!-- Carte France / Île-de-France stylisée -->
      <div class="map-container">
        <!-- Pins bien positionnés -->
        <div class="map-pin" style="top:38%; left:52%;" onclick="goToSite('TCR')">📍</div>
        <div class="pin-label" style="top:32%; left:45%;">TCR<br>Guyancourt</div>

        <div class="map-pin" style="top:48%; left:38%;" onclick="goToSite('VSF')">📍</div>
        <div class="pin-label" style="top:50%; left:25%;">VSF</div>

        <div class="map-pin" style="top:62%; left:48%;" onclick="goToSite('CTL')">📍</div>
        <div class="pin-label" style="top:65%; left:42%;">CTL - Lardy</div>

        <div class="map-pin" style="top:28%; left:72%;" onclick="goToSite('CRI')">📍</div>
        <div class="pin-label" style="top:23%; left:65%;">CRI / KIN</div>

        <div class="map-pin" style="top:55%; left:65%;" onclick="goToSite('CTA')">📍</div>
        <div class="pin-label" style="top:58%; left:68%;">CTA - Aubevoye</div>
      </div>

      <p style="text-align:center; color:#666; margin:10px 0 25px;">Cliquez sur les épingles pour accéder directement au KPI du site</p>

      <h2 style="margin-top:20px;">Accès rapide</h2>

      <div onclick="goTo('index-form.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📋 Audit Simple
      </div>
      <div onclick="goTo('grille-detaillee.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📋 Grille Détaillée
      </div>
      <div onclick="goTo('photo.html')" style="background:#f8f8f8;padding:18px;border-radius:14px;margin-bottom:12px;cursor:pointer;">
        📸 Photo + Analyse IA
      </div>
    </div>
  </div>

  <script>
    function goTo(page) {
      window.location.href = page;
    }

    function goToSite(site) {
      localStorage.setItem('selectedSite', site);
      window.location.href = "dashboard.html";
    }

    window.onload = () => {
      const email = localStorage.getItem('userEmail');
      if (!email) window.location.href = "index.html";
    };
  </script>
</body>
</html>
